<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FitAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--a:#C5F135;--bg:#080808;--s1:#111;--s2:#181818;--bd:#282828;--t1:#fff;--t2:#888}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:32px;width:100%;max-width:360px}
.logo{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--a);letter-spacing:4px;text-align:center;margin-bottom:24px}
input{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;width:100%;margin-bottom:10px}
.btn{background:var(--a);color:#000;font-size:14px;font-weight:600;padding:11px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;width:100%}
.err{color:#ef4444;font-size:12px;margin-bottom:10px}
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hlogo{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--a);letter-spacing:3px}
.signout{background:transparent;border:1px solid var(--bd);border-radius:8px;padding:5px 12px;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit}
.main{max-width:1100px;margin:0 auto;padding:28px 24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:18px}
.stat-label{color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;font-weight:500}
.stat-val{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:1px;color:var(--t1)}
.stat-sub{color:var(--t2);font-size:12px;margin-top:4px}
.stat-val.green{color:var(--a)}
.section-title{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:1px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:1px;text-align:left;padding:8px 12px;border-bottom:1px solid var(--bd);font-weight:500}
td{padding:10px 12px;border-bottom:1px solid var(--bd);color:var(--t1)}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.badge-pro{background:rgba(197,241,53,.15);color:var(--a)}
.badge-free{background:rgba(255,255,255,.08);color:var(--t2)}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{background:transparent;border:1px solid var(--bd);border-radius:8px;padding:6px 14px;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s}
.tab.active{background:var(--a);color:#000;border-color:var(--a);font-weight:600}
.refresh{background:transparent;border:1px solid var(--bd);border-radius:8px;padding:5px 12px;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;float:right}
.empty{color:var(--t2);font-size:13px;text-align:center;padding:30px}
</style>
</head>
<body>

<div id="login-screen" class="login">
  <div class="login-card">
    <div class="logo">FITAI ADMIN</div>
    <div id="login-err" class="err" style="display:none"></div>
    <input type="email" id="email" placeholder="Admin email"/>
    <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn" onclick="login()">Log In</button>
    <p style="color:var(--t2);font-size:11px;text-align:center;margin-top:16px">Access restricted to admin users only.</p>
  </div>
</div>

<div id="app-screen" style="display:none">
  <header>
    <span class="hlogo">FITAI ADMIN</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="admin-email" style="color:var(--t2);font-size:12px"></span>
      <button class="signout" onclick="signout()">Sign Out</button>
    </div>
  </header>

  <div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h1 style="font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:2px">DASHBOARD</h1>
      <button class="refresh" onclick="loadAll()">↻ Refresh</button>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val" id="s-users">—</div></div>
      <div class="stat-card"><div class="stat-label">Pro Users</div><div class="stat-val green" id="s-pro">—</div><div class="stat-sub" id="s-pro-rev">$0 MRR</div></div>
      <div class="stat-card"><div class="stat-label">Free Users</div><div class="stat-val" id="s-free">—</div></div>
      <div class="stat-card"><div class="stat-label">Saved Plans</div><div class="stat-val" id="s-plans">—</div><div class="stat-sub" id="s-plans-sub">workouts + meals</div></div>
      <div class="stat-card"><div class="stat-label">Total AI Generations</div><div class="stat-val" id="s-gen">—</div></div>
      <div class="stat-card"><div class="stat-label">New Users (7 days)</div><div class="stat-val" id="s-new">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('users')">Users</button>
      <button class="tab" onclick="showTab('plans')">Saved Plans</button>
      <button class="tab" onclick="showTab('usage')">Usage</button>
    </div>

    <div id="tab-users" class="card">
      <div id="users-table"><div class="empty">Loading...</div></div>
    </div>

    <div id="tab-plans" class="card" style="display:none">
      <div id="plans-table"><div class="empty">Loading...</div></div>
    </div>

    <div id="tab-usage" class="card" style="display:none">
      <div id="usage-table"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG — replace with your values ──────────────────────────────────────
const SUPABASE_URL = "https://your-project.supabase.co";
const SUPABASE_SERVICE_KEY = "your-service-role-key"; // Settings → API → service_role key
// NEVER expose the service key publicly — host this admin dashboard behind auth only
// ──────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);
let currentUser = null;

async function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const errEl = document.getElementById("login-err");
  errEl.style.display = "none";

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; errEl.style.display = "block"; return; }

  // Check if user is admin (you can add an 'is_admin' column to profiles, or use email allowlist)
  const adminEmails = ["your-admin-email@example.com"]; // Replace with your email
  if (!adminEmails.includes(email)) {
    await sb.auth.signOut();
    errEl.textContent = "Access denied. Admin only.";
    errEl.style.display = "block";
    return;
  }

  currentUser = data.user;
  document.getElementById("admin-email").textContent = email;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";
  loadAll();
}

async function signout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadAll() {
  await Promise.all([loadStats(), loadUsers(), loadPlans(), loadUsage()]);
}

async function loadStats() {
  const [{ data: profiles }, { data: plans }] = await Promise.all([
    sb.from("profiles").select("plan, generations_used, created_at"),
    sb.from("saved_plans").select("type")
  ]);

  const total = profiles?.length || 0;
  const pro = profiles?.filter(p => p.plan === "pro").length || 0;
  const free = total - pro;
  const mrr = pro * 12;
  const totalPlans = plans?.length || 0;
  const workouts = plans?.filter(p => p.type === "workout").length || 0;
  const meals = plans?.filter(p => p.type === "meal").length || 0;
  const totalGen = profiles?.reduce((s, p) => s + (p.generations_used || 0), 0) || 0;
  const week = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const newUsers = profiles?.filter(p => p.created_at > week).length || 0;

  document.getElementById("s-users").textContent = total;
  document.getElementById("s-pro").textContent = pro;
  document.getElementById("s-pro-rev").textContent = `$${mrr}/mo MRR`;
  document.getElementById("s-free").textContent = free;
  document.getElementById("s-plans").textContent = totalPlans;
  document.getElementById("s-plans-sub").textContent = `${workouts} workouts · ${meals} meals`;
  document.getElementById("s-gen").textContent = totalGen.toLocaleString();
  document.getElementById("s-new").textContent = newUsers;
}

async function loadUsers() {
  const { data: { users } } = await sb.auth.admin.listUsers();
  const { data: profiles } = await sb.from("profiles").select("*");

  const profMap = {};
  profiles?.forEach(p => profMap[p.id] = p);

  const html = users?.length === 0
    ? '<div class="empty">No users yet.</div>'
    : `<table><thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Generations</th><th>Goal</th><th>Signed Up</th></tr></thead><tbody>
      ${users.map(u => {
        const p = profMap[u.id] || {};
        return `<tr>
          <td>${p.name || u.user_metadata?.name || "—"}</td>
          <td style="color:var(--t2)">${u.email}</td>
          <td><span class="badge badge-${p.plan||'free'}">${p.plan||'free'}</span></td>
          <td>${p.generations_used || 0}</td>
          <td style="color:var(--t2)">${p.fitness_goal?.replace("_"," ") || "—"}</td>
          <td style="color:var(--t2)">${new Date(u.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</td>
        </tr>`;
      }).join("")}
    </tbody></table>`;

  document.getElementById("users-table").innerHTML = html;
}

async function loadPlans() {
  const { data } = await sb.from("saved_plans").select("*, profiles!inner(name)").order("created_at", { ascending: false }).limit(50);

  const html = !data?.length
    ? '<div class="empty">No saved plans yet.</div>'
    : `<table><thead><tr><th>User</th><th>Type</th><th>Title</th><th>Subtitle</th><th>Saved</th></tr></thead><tbody>
      ${data.map(p => `<tr>
        <td>${p.profiles?.name || "—"}</td>
        <td><span class="badge badge-${p.type==='workout'?'pro':'free'}">${p.type}</span></td>
        <td>${p.title}</td>
        <td style="color:var(--t2)">${p.subtitle || "—"}</td>
        <td style="color:var(--t2)">${new Date(p.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</td>
      </tr>`).join("")}
    </tbody></table>`;

  document.getElementById("plans-table").innerHTML = html;
}

async function loadUsage() {
  const { data } = await sb.from("profiles").select("name, plan, generations_used, calorie_goal, fitness_goal, weight, goal_weight").order("generations_used", { ascending: false });

  const html = !data?.length
    ? '<div class="empty">No usage data yet.</div>'
    : `<table><thead><tr><th>Name</th><th>Plan</th><th>Generations Used</th><th>Goal</th><th>Current Weight</th><th>Goal Weight</th></tr></thead><tbody>
      ${data.map(p => `<tr>
        <td>${p.name || "—"}</td>
        <td><span class="badge badge-${p.plan||'free'}">${p.plan||'free'}</span></td>
        <td style="color:${(p.generations_used||0)>=8?'#ef4444':'var(--t1)'}">${p.generations_used || 0}/10</td>
        <td style="color:var(--t2)">${p.fitness_goal?.replace("_"," ") || "—"}</td>
        <td style="color:var(--t2)">${p.weight ? p.weight+" lbs" : "—"}</td>
        <td style="color:var(--t2)">${p.goal_weight ? p.goal_weight+" lbs" : "—"}</td>
      </tr>`).join("")}
    </tbody></table>`;

  document.getElementById("usage-table").innerHTML = html;
}

function showTab(name) {
  ["users","plans","usage"].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===name?"block":"none";
    document.querySelectorAll(".tab")[["users","plans","usage"].indexOf(t)].classList.toggle("active", t===name);
  });
}
</script>
</body>
</html>
